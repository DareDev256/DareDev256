name: Validate README

on:
  push:
    branches: [main]
    paths: ['README.md', 'CHANGELOG.md', 'CLAUDE.md', 'signature.svg']
  pull_request:
    branches: [main]
    paths: ['README.md', 'CHANGELOG.md', 'CLAUDE.md', 'signature.svg']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README line count
        run: |
          total=$(wc -l < README.md)
          echo "README.md: $total lines"
          if [ "$total" -gt 500 ]; then
            echo "::error::README.md exceeds 500 total lines ($total). Target: ~300 lines max."
            exit 1
          fi

      - name: Check auto-update markers
        run: |
          missing=0
          for marker in DAILY_STATUS_START DAILY_STATUS_END SHOWCASE_SECTION_START SHOWCASE_SECTION_END; do
            if ! grep -q "<!-- ${marker} -->" README.md; then
              echo "::error::Missing marker: <!-- ${marker} -->"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All auto-update markers present."

      - name: Check marker zone ordering
        run: |
          ds_start=$(grep -n 'DAILY_STATUS_START' README.md | head -1 | cut -d: -f1)
          ds_end=$(grep -n 'DAILY_STATUS_END' README.md | head -1 | cut -d: -f1)
          sc_start=$(grep -n 'SHOWCASE_SECTION_START' README.md | head -1 | cut -d: -f1)
          sc_end=$(grep -n 'SHOWCASE_SECTION_END' README.md | head -1 | cut -d: -f1)

          if [ "$ds_start" -ge "$ds_end" ]; then
            echo "::error::DAILY_STATUS_START must come before DAILY_STATUS_END"
            exit 1
          fi
          if [ "$sc_start" -ge "$sc_end" ]; then
            echo "::error::SHOWCASE_SECTION_START must come before SHOWCASE_SECTION_END"
            exit 1
          fi
          echo "Marker zones correctly ordered."

      - name: Check version consistency
        run: |
          # Extract version from CHANGELOG (first [x.y.z] heading)
          cl_version=$(grep -oP '## \[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          echo "CHANGELOG version: $cl_version"

          # Extract version from CLAUDE.md
          claude_version=$(grep -oP 'Current: v\K[0-9]+\.[0-9]+\.[0-9]+' CLAUDE.md)
          echo "CLAUDE.md version: $claude_version"

          if [ -n "$cl_version" ] && [ -n "$claude_version" ]; then
            if [ "$cl_version" != "$claude_version" ]; then
              echo "::warning::Version mismatch — CHANGELOG: $cl_version, CLAUDE.md: $claude_version"
            fi
          fi

      - name: Check signature.svg exists
        run: |
          if [ ! -f signature.svg ]; then
            echo "::error::signature.svg is missing — hero image will be broken"
            exit 1
          fi
          echo "signature.svg present ($(wc -c < signature.svg) bytes)"

      - name: Validate SVG security constraints
        # Enforces the security contract documented in signature.svg lines 49–63.
        # These prevent CWE-79 (XSS via SVG injection) and CWE-918 (SSRF via
        # external resource loading). Without this step, the constraints are
        # "enforced by review only" — a single careless commit bypasses them.
        run: |
          violations=0
          svg="signature.svg"

          # Block <script> elements (XSS payload delivery)
          if grep -Piq '<\s*script[\s>]' "$svg"; then
            echo "::error::SVG contains <script> element — XSS vector (CWE-79)"
            violations=1
          fi

          # Block <foreignObject> (renders arbitrary HTML inside SVG)
          if grep -Piq '<\s*foreignObject[\s>]' "$svg"; then
            echo "::error::SVG contains <foreignObject> — HTML injection vector"
            violations=1
          fi

          # Block inline event handlers (onclick, onload, onerror, onmouseover, etc.)
          if grep -Piq '\bon\w+\s*=' "$svg"; then
            echo "::error::SVG contains inline event handler (on*=) — XSS vector"
            violations=1
          fi

          # Block url() in CSS — prevents data exfiltration via external resources.
          # Allowed: url(#id) for internal fragment references (filters, gradients).
          # Blocked: url(http...), url(data:...), url(//...) — anything non-fragment.
          if grep -Pin 'url\s*\([^#)][^)]*\)' "$svg" | grep -Piv 'url\s*\(\s*#'; then
            echo "::error::SVG contains url() with external reference — SSRF/tracking vector (CWE-918)"
            violations=1
          fi

          # Block @import and @font-face with external src
          if grep -Piq '@import\s' "$svg"; then
            echo "::error::SVG contains @import — external resource loading"
            violations=1
          fi
          if grep -Piq '@font-face' "$svg"; then
            echo "::error::SVG contains @font-face — external font loading risk"
            violations=1
          fi

          # Block xlink:href with external URLs (use href= for internal refs)
          if grep -Pi 'xlink:href\s*=\s*["\x27]https?://' "$svg"; then
            echo "::error::SVG contains external xlink:href — SSRF vector"
            violations=1
          fi

          if [ "$violations" -eq 1 ]; then
            exit 1
          fi
          echo "SVG security constraints validated — no prohibited elements or attributes."

      - name: Validate no secrets in committed files
        run: |
          found=0
          scan_files="README.md CHANGELOG.md CLAUDE.md FOR_DARE.md signature.svg"
          # Word-bounded patterns prevent mid-word matches (e.g. "flask-session-key...")
          # Quantifiers sized to real key lengths: OpenAI 20+, GitHub PAT 36+, AWS 16+
          for pattern in '\bsk-[a-zA-Z0-9_-]{20,}' '\bghp_[a-zA-Z0-9]{36,}' '\bAKIA[A-Z0-9]{16,}' '\bBearer [a-zA-Z0-9._\-]{20,}'; do
            # Skip documentation lines where the pattern appears inside backticks
            # Uses -E for ERE (matching the first grep) and requires a closing backtick
            matches=$(grep -En "$pattern" $scan_files 2>/dev/null | grep -Ev '`[^`]*'"$pattern"'[^`]*`' || true)
            if [ -n "$matches" ]; then
              echo "::error::Potential secret found matching pattern: $pattern"
              echo "$matches"
              found=1
            fi
          done
          if [ "$found" -eq 1 ]; then
            exit 1
          fi
          echo "No secrets detected."
